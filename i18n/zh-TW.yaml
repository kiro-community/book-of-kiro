# 搜尋配置 - 針對中文最佳化
- id: bookSearchConfig
  translation: |
    {
      encode: false,
      tokenize: function(str) {
        // 中文字元分詞：將中文字元單獨分離，保留英文單詞完整性
        return str.replace(/[\u4e00-\u9fff]/g, ' $& ').split(/\s+/).filter(function(token) {
          return token.length > 0;
        });
      },
      threshold: 0.3,
      distance: 100,
      maxPatternLength: 32,
      minMatchCharLength: 1,
      ignoreLocation: true,
      findAllMatches: true
    }

